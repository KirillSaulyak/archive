filebeat.inputs:
  - type: filestream
    paths:
      - /usr/share/filebeat/logs/rest/*.log
    fields: {service: rest}
    fields_under_root: true

#  - type: filestream
#    paths:
#      - /usr/share/filebeat/logs/DB/*.log
#    fields: {service: postgresql}
#    fields_under_root: true


filebeat:
  modules:
    - module: postgresql
      log:
        enabled: true
        var.paths: ["/usr/share/filebeat/logs/DB/*.log"]

#  - type: filestream
#    paths:
#       - /usr/share/filebeat/logs/logstash/*.log
#    fields: {service: logstash}
#    fields_under_root: true

queue.mem:
  events: 8192
  flush.min_events: 100
  flush.timeout: 3s
  
output.logstash:
   hosts: ["logstash:5044"]