databaseChangeLog:
  - changeSet:
      id: 20230721_155600
      author: kerich
      changes:
        - createTable:
            schemaName: movie
            tableName: movies
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: movie_release
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: duration
                  type: varchar(10)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: varchar(1000)
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: varchar(45)
                  constraints:
                    nullable: false
              - column:
                  name: name_another
                  type: varchar(45)
                  constraints:
                    nullable: false
              - column:
                  name: movie_types_id
                  type: bigint
                  constraints:
                    foreignKeyName: movie_movie_types
                    referencedTableSchemaName: movie
                    referencedTableName: movie_types
                    referencedColumnNames: id
                    nullable: false
              - column:
                  name: directors_id
                  type: bigint
                  constraints:
                    foreignKeyName: movie_directors
                    referencedTableSchemaName: movie
                    referencedTableName: directors
                    referencedColumnNames: id
                    nullable: false
              - column:
                  name: countries_id
                  type: bigint
                  constraints:
                    foreignKeyName: movie_countries
                    referencedTableSchemaName: movie
                    referencedTableName: countries
                    referencedColumnNames: id
                    nullable: false
              - column:
                  name: genres_id
                  type: bigint
                  constraints:
                    foreignKeyName: movie_genres
                    referencedTableSchemaName: movie
                    referencedTableName: genres
                    referencedColumnNames: id
                    nullable: false
              - column:
                  name: translators_id
                  type: bigint
                  constraints:
                    foreignKeyName: movie_translators
                    referencedTableSchemaName: movie
                    referencedTableName: translators
                    referencedColumnNames: id
                    nullable: false
              - column:
                  name: actors_id
                  type: bigint
                  constraints:
                    foreignKeyName: movie_actors
                    referencedTableSchemaName: movie
                    referencedTableName: actors
                    referencedColumnNames: id
              - column:
                  name: movie_themes_id
                  type: bigint
                  constraints:
                    foreignKeyName: movie_movie_themes
                    referencedTableSchemaName: movie
                    referencedTableName: movie_themes
                    referencedColumnNames: id




